name: CI/CD

on:
  pull_request:
    branches: ['**']
  push:
    # TODO: ukloniti '**' nakon validacije na forku; ostaviti samo [main]
    branches: [main, '**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: '20'

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run ESLint
        run: npm run lint

  # ── Proto freshness (no-op dok proto/ ne postoji u repou) ──────────────────
  proto-check:
    name: Proto freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip if no proto files
        id: guard
        run: |
          if [ -d proto ] && find proto -name '*.proto' -print -quit | grep -q .; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Nema proto/ fajlova — preskačem."
          fi

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.run == 'true'
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: npm ci --prefer-offline --no-audit

      - name: Regenerate proto
        if: steps.guard.outputs.run == 'true'
        run: npm run proto:gen

      - name: Verify src/proto is up to date
        if: steps.guard.outputs.run == 'true'
        run: git diff --exit-code src/proto

  # ── Cypress E2E (CI smoke, mocked) ─────────────────────────────────────────
  cypress:
    name: Cypress E2E (smoke, mocked)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            cypress-${{ runner.os }}-

      - name: Run Cypress
        uses: cypress-io/github-action@v6
        with:
          install-command: npm ci --prefer-offline --no-audit
          start: npm run dev -- --host 127.0.0.1 --port 3000
          wait-on: 'http://127.0.0.1:3000'
          wait-on-timeout: 120
          command: npm run test:e2e:ci

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore
          retention-days: 7

  # ── Docker build (bez push-a) ──────────────────────────────────────────────
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: exbanka-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Docker push u GHCR (CD, samo main) ─────────────────────────────────────
  docker-push:
    name: Docker push (GHCR)
    needs: [lint, cypress, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: img
        run: |
          echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
